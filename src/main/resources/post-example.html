<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GET Example / API Status (nur HTML)</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; padding: 1rem; }
        label { display: block; margin-top: .5rem; }
        input { width: 100%; max-width: 400px; padding: .4rem; margin-top: .2rem; }
        button, a.button-like { margin-top: .8rem; padding: .5rem 1rem; display:inline-block; text-decoration:none; color:inherit; border:1px solid #ccc; background:#fff; border-radius:4px; }
        .hint { margin-top: .8rem; color:#555; }
        pre { background:#f6f6f6; padding:.5rem; border-radius:4px; max-width:900px; overflow:auto; }
    </style>
</head>
<body>
<h1>Beispiel: GET /user (nur HTML)</h1>

<p>Dieses Formular sendet einfache GET-Parameter an <code>http://localhost:7070/user</code>. Kein JavaScript erforderlich.</p>

<form id="apiForm" method="post" action="http://localhost:7070/user">
    <label for="userId">ID</label>
    <input id="userId" name="id" type="number" value="1" required>

    <label for="userName">Name</label>
    <input id="userName" name="name" type="text" value="givara" required>

    <label for="userEmail">E-Mail</label>
    <input id="userEmail" name="email" type="email" value="test@ebouprime.com" required>

    <!-- Standard-Submit (gleiche Seite) -->
    <button type="submit">Senden (gleicher Tab)</button>

    <!-- Öffnet das Ergebnis in einem neuen Tab/Fenster; funktioniert ohne JS -->
    <button type="submit" formtarget="_blank">Öffnen in neuem Tab</button>
</form>


</body>
</html>
